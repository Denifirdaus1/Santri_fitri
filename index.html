<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login | Sistem Perizinan Santri</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem Informasi Perizinan Santri - Pesantren Tanwirul Qulub">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(220, 255, 222, 0.85), rgba(20,90,50,0.85)), 
                        url('assets/img/masjid.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .login-wrapper {
            width: 900px;
            max-width: 100%;
            background: white;
            border-radius: 16px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(0,0,0,0.3);
        }

        .login-left {
            flex: 1;
            padding: 45px;
        }

        .login-left h2 {
            color: #1b5e20;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-left p {
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #1b5e20;
            box-shadow: 0 0 0 3px rgba(27,94,32,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #2e7d32, #1b5e20);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27,94,32,0.3);
        }

        .signup-link {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .signup-link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
        }

        .notification {
            padding: 15px 20px;
            border-radius: 30px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            animation: slideDown 0.5s ease-out;
        }

        .notification.success {
            background: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #a5d6a7;
        }

        .notification.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .login-right {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, rgba(34,139,34,0.95), rgba(20,90,50,0.95));
            color: white;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .login-right img {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 320px;
            opacity: 0.15;
            transform: rotate(5deg);
        }

        .login-right .content {
            position: relative;
            z-index: 2;
        }

        .login-right h1 {
            font-size: 38px;
            margin-bottom: 20px;
        }

        .login-right p {
            font-size: 16px;
            line-height: 1.7;
            opacity: 0.9;
            max-width: 300px;
            margin: 0 auto 30px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .features div {
            text-align: center;
        }

        .features i {
            font-size: 24px;
            margin-bottom: 5px;
            display: block;
        }

        .features span {
            font-size: 12px;
        }

        .credit {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }
            .login-right {
                display: none;
            }
            .login-left {
                padding: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-left">
            <h2>Selamat Datang</h2>
            <p>Sistem Informasi Perizinan Santri Pesantren</p>
            
            <div id="notification"></div>

            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Username / NIS" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fa-solid fa-right-to-bracket"></i> Masuk
                </button>
            </form>

            <div class="signup-link">
                Belum punya akun? <a href="register.html">Daftar Santri Baru</a>
            </div>
            <div class="credit">
                <i class="fa-regular fa-circle-question"></i> madebyfitri
            </div>
        </div>
        <div class="login-right">
            <img src="assets/img/santri.png" alt="Santri">
            <div class="content">
                <h1>Sistem Perizinan Santri</h1>
                <p>Mendukung pengelolaan izin santri keluar dan pulang secara tertib, aman, dan terdokumentasi dengan baik.</p>
                <div class="features">
                    <div><i class="fa-solid fa-check-circle"></i><span>Izin Online</span></div>
                    <div><i class="fa-solid fa-clock"></i><span>Monitoring</span></div>
                    <div><i class="fa-solid fa-chart-simple"></i><span>Rekapitulasi</span></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { login, getSession, getUserRole } from './js/auth.js'

    // Tampilkan notifikasi
    function showNotification(type, message) {
        const notif = document.getElementById('notification');
        const icon = type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation';
        
        notif.innerHTML = `
            <div class="notification ${type}">
                <i class="fa-solid ${icon}"></i>
                <span>${message}</span>
            </div>
        `;
        
        setTimeout(() => {
            notif.innerHTML = '';
        }, 5000);
    }

    // Cek apakah sudah login → redirect
    const session = await getSession()
    if (session) {
        const role = getUserRole(session.user)
        if (role === 'admin') {
            window.location.href = '/admin'
        } else if (role === 'santri') {
            window.location.href = '/santri'
        }
    }

    // Cek logout success dari URL param
    const urlParams = new URLSearchParams(window.location.search)
    if (urlParams.get('logout') === 'success') {
        showNotification('success', 'Berhasil logout!')
    }

    // Handle login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        
        if (!username || !password) {
            showNotification('error', 'Username/NIS dan password harus diisi!');
            return;
        }
        
        // Show loading
        const originalText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<span class="loading-spinner"></span> Memproses...';
        loginBtn.disabled = true;
        
        try {
            const data = await login(username, password)
            
            showNotification('success', 'Login berhasil! Mengalihkan...');
            
            setTimeout(() => {
                const role = getUserRole(data.user)
                if (role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/santri';
                }
            }, 1000);
        } catch (error) {
            console.error('Error:', error);
            showNotification('error', error.message || 'Login gagal');
            loginBtn.innerHTML = originalText;
            loginBtn.disabled = false;
        }
    });
    </script>
</body>
</html>
