<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Data Santri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .card-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group label i {
            margin-right: 8px;
            color: #1b5e20;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #1b5e20;
            box-shadow: 0 0 0 3px rgba(27, 94, 32, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 5px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .radio-group label:hover {
            border-color: #1b5e20;
            background: #f1f8e9;
        }

        .radio-group input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #1b5e20;
        }

        select.form-control {
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 15px;
            appearance: none;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: #1b5e20;
            color: white;
        }

        .btn-primary:hover {
            background: #2e7d32;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 94, 32, 0.3);
        }

        .btn-secondary {
            background: #757575;
            color: white;
        }

        .btn-secondary:hover {
            background: #616161;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(117, 117, 117, 0.3);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .alert-error i {
            color: #c62828;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .back-link a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Icon styling */
        .fa-mars { color: #2196f3; }
        .fa-venus { color: #e91e63; }
        
        /* Required field indicator */
        .required {
            color: #c62828;
            margin-left: 3px;
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* POPUP ANIMASI */
        .popup-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            pointer-events: none;
        }

        .popup {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            animation: popIn 0.5s ease-out;
            pointer-events: all;
            max-width: 400px;
            position: relative;
        }

        .popup.success {
            border-top: 5px solid #4caf50;
        }

        .popup.error {
            border-top: 5px solid #f44336;
        }

        .popup.warning {
            border-top: 5px solid #ff9800;
        }

        .popup i {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .popup.success i {
            color: #4caf50;
        }

        .popup.error i {
            color: #f44336;
        }

        .popup.warning i {
            color: #ff9800;
        }

        .popup h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .popup p {
            margin-bottom: 20px;
            color: #666;
        }

        .popup-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .popup-btn {
            padding: 10px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .popup-btn.confirm {
            background: #4caf50;
            color: white;
        }

        .popup-btn.cancel {
            background: #f44336;
            color: white;
        }

        .popup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .popup-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #999;
        }

        .popup-close:hover {
            color: #333;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            70% {
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
<div class="mobile-overlay" onclick="document.querySelector('.sidebar').classList.remove('active'); this.classList.remove('active')"></div>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>
                    <i class="fa-solid fa-user-edit"></i>
                    Edit Data Santri
                </h2>
                <p>Silahkan edit data santri pada form dibawah ini</p>
            </div>
            
            <div class="card-body">
                <!-- Loading state -->
                <div id="loadingContainer" style="text-align: center; padding: 20px; display: none;">
                    <div class="loading-spinner" style="border-top-color: #1b5e20; width: 40px; height: 40px;"></div>
                    <p style="margin-top: 15px; color: #666;">Memuat data santri...</p>
                </div>

                <!-- Error container -->
                <div id="errorContainer" style="display: none;"></div>

                <!-- Form container -->
                <div id="formContainer" style="display: none;">
                    <form id="editForm">
                        <input type="hidden" id="id_santri" name="id_santri">
                        
                        <div class="form-group">
                            <label>
                                <i class="fa-solid fa-id-card"></i>
                                NIS <span class="required">*</span>
                            </label>
                            <input type="text" name="nis" id="nis" class="form-control" required placeholder="Masukkan NIS">
                        </div>
                        
                        <div class="form-group">
                            <label>
                                <i class="fa-solid fa-user"></i>
                                Nama Lengkap <span class="required">*</span>
                            </label>
                            <input type="text" name="nama_santri" id="nama_santri" class="form-control" required placeholder="Masukkan nama lengkap">
                        </div>
                        
                        <div class="form-group">
                            <label>
                                <i class="fa-solid fa-venus-mars"></i>
                                Jenis Kelamin <span class="required">*</span>
                            </label>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="jenis_kelamin" value="L" required> 
                                    <i class="fa-solid fa-mars"></i> Laki-laki
                                </label>
                                <label>
                                    <input type="radio" name="jenis_kelamin" value="P" required> 
                                    <i class="fa-solid fa-venus"></i> Perempuan
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>
                                <i class="fa-solid fa-school"></i>
                                Kelas <span class="required">*</span>
                            </label>
                            <select name="kelas" id="kelas" class="form-control" required>
                                <option value="">-- Pilih Kelas --</option>
                                <option value="Ula">Ula</option>
                                <option value="Wustho">Wustho</option>
                                <option value="Ulya">Ulya</option>
                            </select>
                        </div>
                        
                        <div class="btn-group">
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <i class="fa-solid fa-save"></i>
                                Update Data
                            </button>
                            <a href="/admin/kelola-santri" class="btn btn-secondary">
                                <i class="fa-solid fa-arrow-left"></i>
                                Kembali
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="back-link">
            <a href="/admin/kelola-santri">
                <i class="fa-solid fa-chevron-left"></i>
                Kembali ke Daftar Santri
            </a>
        </div>
    </div>

    <!-- POPUP CONTAINER -->
    <div id="popupContainer" class="popup-container" style="display: none;"></div>

    <script type="module">
import { supabase } from '../js/supabase-client.js'
import { requireAuth, logout as authLogout } from '../js/auth.js'
import { showToast, showPopup, closePopup, setUserInfo } from '../js/utils.js'

window.showLogoutPopup = showLogoutPopup

function showLogoutPopup() {
    showPopup({ type: 'confirm', title: 'Yakin mau logout? 🥺', message: 'Kamu akan kembali ke halaman login', confirmText: 'Logout',
        onConfirmFn: async () => { closePopup(); showToast('info', 'Logout...'); await authLogout(); setTimeout(() => { window.location.href = '/?logout=success' }, 1000) }
    })
}

const urlParams = new URLSearchParams(window.location.search)
const santriId = urlParams.get('id')

async function loadSantri() {
    if (!santriId) { showToast('error', 'ID santri tidak ditemukan'); return }
    
    document.getElementById('loadingContainer').style.display = 'block';
    
    try {
        const { data, error } = await supabase.from('santri').select('*').eq('id_santri', santriId).single()
        if (error) throw error
        if (data) {
            document.getElementById('nis').value = data.nis || ''
            document.getElementById('nama_santri').value = data.nama_santri || ''
            if(data.jenis_kelamin) { const rb = document.querySelector('input[name="jenis_kelamin"][value="' + data.jenis_kelamin + '"]'); if(rb) rb.checked = true; }
            document.getElementById('kelas').value = data.kelas || ''
            
            document.getElementById('loadingContainer').style.display = 'none';
            document.getElementById('formContainer').style.display = 'block';
        }
    } catch (error) {
        console.error('Error:', error)
        document.getElementById('loadingContainer').style.display = 'none';
        showToast('error', 'Gagal memuat data santri')
    }
}

document.getElementById('editForm')?.addEventListener('submit', async (e) => {
    e.preventDefault()
    const nis = document.getElementById('nis').value
    const nama = document.getElementById('nama_santri').value
    const jkRadio = document.querySelector('input[name="jenis_kelamin"]:checked'); const jk = jkRadio ? jkRadio.value : null
    const kelas = document.getElementById('kelas').value

    if (!nis || !nama || !jk || !kelas) { showToast('error', 'Semua field harus diisi!'); return }

    const btn = e.target.querySelector('button[type="submit"]')
    const orig = btn.innerHTML
    btn.innerHTML = '<span class="loading-spinner"></span> Menyimpan...'; btn.disabled = true

    try {
        const { error } = await supabase.from('santri').update({ nis, nama_santri: nama, jenis_kelamin: jk, kelas }).eq('id_santri', santriId)
        if (error) throw error
        showPopup({ type: 'success', title: 'Berhasil! ðŸŽ‰', message: 'Data santri berhasil diupdate!' })
        setTimeout(() => { window.location.href = '/admin/kelola-santri' }, 1500)
    } catch (error) {
        console.error('Error:', error)
        showToast('error', error.message || 'Gagal update data')
    }
    btn.innerHTML = orig; btn.disabled = false
})

;(async () => {
    const user = await requireAuth('admin', '/')
    if (!user) return
    setUserInfo(user)
    loadSantri()
})()
</script>
</body>
</html>
